name: Google Cloud Binary Authorization
description: >-
  Google Cloud Binary Authorization is a deploy-time security control that
  ensures only trusted container images are deployed on Google Kubernetes Engine
  (GKE), Cloud Run, and Anthos clusters. It uses attestation-based policies to
  validate that container images have been signed by trusted authorities before
  allowing deployment, helping enforce software supply chain security.
