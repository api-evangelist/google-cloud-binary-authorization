apis:
- name: Binary Authorization API
  description: >-
    The Binary Authorization API provides programmatic access to manage
    deploy-time security policies for container images. Developers can use the
    API to create and manage attestors, attestations, and policies that control
    which container images are allowed to be deployed. The API integrates with
    GKE, Cloud Run, and Anthos to enforce that only verified and trusted
    container images are deployed to production environments.
